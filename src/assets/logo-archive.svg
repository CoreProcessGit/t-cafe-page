<svg width="220" height="44" viewBox="0 0 220 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 커피 김 -->
  <path d="M12 10 Q13.2 7 12 4" stroke="#1a4e87" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.6">
    <animate attributeName="d" values="M12 10 Q13.2 7 12 4;M12 10 Q10.8 7 12 4;M12 10 Q13.2 7 12 4" dur="3s" repeatCount="indefinite" />
  </path>
  <path d="M16.5 9 Q17.7 6 16.5 3" stroke="#1a4e87" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.4">
    <animate attributeName="d" values="M16.5 9 Q17.7 6 16.5 3;M16.5 9 Q15.3 6 16.5 3;M16.5 9 Q17.7 6 16.5 3" dur="2.5s" repeatCount="indefinite" />
  </path>
  <path d="M21 10 Q22.2 7 21 4" stroke="#1a4e87" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.5">
    <animate attributeName="d" values="M21 10 Q22.2 7 21 4;M21 10 Q19.8 7 21 4;M21 10 Q22.2 7 21 4" dur="3.5s" repeatCount="indefinite" />
  </path>

  <!-- 컵 -->
  <path d="M7 13 L9.5 30 Q10 32.5 13 32.5 L21 32.5 Q24 32.5 24.5 30 L27 13 Z" stroke="#1a4e87" stroke-width="1.8" fill="none" />
  <path d="M27 17 Q32 17 32 22 Q32 27 27 27" stroke="#1a4e87" stroke-width="1.8" fill="none" />
  <ellipse cx="17" cy="33.5" rx="11.5" ry="1.8" stroke="#1a4e87" stroke-width="1.3" fill="none" />

  <!-- 순환 + 체크 -->
  <circle cx="29" cy="8" r="5" stroke="#019c7d" stroke-width="1.2" fill="none" stroke-dasharray="2 1.2" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 29 8" to="360 29 8" dur="8s" repeatCount="indefinite" />
  </circle>
  <path d="M26.5 8 L28 9.8 L31.5 6" stroke="#019c7d" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- T-CAFE -->
  <text x="40" y="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="22" fill="#1a4e87" letter-spacing="-0.5">T-CAFE</text>

  <!-- archive (3px만 떨어뜨림) -->
  <text x="120" y="24" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="16" fill="#019c7d" font-style="italic" letter-spacing="0">archive</text>

  <!-- 서브 카피 (크게, 진하게) -->
